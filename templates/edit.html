<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>编辑病历</title>
    <style>
        body { font-family: "Microsoft Yahei", sans-serif; margin: 20px; }
        .btn { padding: 5px 10px; background: #007bff; color: white; text-decoration: none; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>编辑病历</h1>
    <form method="POST">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px;">
            <input type="text" name="name" placeholder="姓名" value="{{ info.name }}" required>
            <select name="gender" required>
                <option value="男" {% if info.gender == '男' %}selected{% endif %}>男</option>
                <option value="女" {% if info.gender == '女' %}selected{% endif %}>女</option>
            </select>
            <input type="number" name="age" placeholder="年龄" value="{{ info.age }}" required>
            <input type="text" name="phone" placeholder="电话" value="{{ info.phone }}" required>
            <input type="datetime-local" name="visit_time" value="{{ info.visit_time }}" required>
            <input type="text" name="chief_complaint" placeholder="主诉" value="{{ info.chief_complaint }}" required>
        </div>
        <textarea name="present_history" placeholder="现病史" rows="2" style="width:100%; margin-bottom:10px;">{{ info.present_history }}</textarea>
        <textarea name="past_history" placeholder="既往史" rows="2" style="width:100%; margin-bottom:10px;">{{ info.past_history }}</textarea>
        <textarea name="allergy_history" placeholder="过敏史" rows="2" style="width:100%; margin-bottom:10px;">{{ info.allergy_history }}</textarea>
        <textarea name="personal_history" placeholder="个人史" rows="2" style="width:100%; margin-bottom:10px;">{{ info.personal_history }}</textarea>
        <textarea name="family_history" placeholder="家族史" rows="2" style="width:100%; margin-bottom:10px;">{{ info.family_history }}</textarea>
        <textarea name="physical_exam" placeholder="体格检查" rows="2" style="width:100%; margin-bottom:10px;">{{ info.physical_exam }}</textarea>
        <textarea name="tcm_diag" placeholder="中医诊断" rows="2" style="width:100%; margin-bottom:10px;">{{ info.tcm_diag }}</textarea>
        <textarea name="syndrome_type" placeholder="证型" rows="2" style="width:100%; margin-bottom:10px;">{{ info.syndrome_type }}</textarea>
        <textarea name="tongue_diag" placeholder="舌诊" rows="2" style="width:100%; margin-bottom:10px;">{{ info.tongue_diag }}</textarea>
        <textarea name="pulse_diag" placeholder="脉诊" rows="2" style="width:100%; margin-bottom:10px;">{{ info.pulse_diag }}</textarea>
        <textarea name="therapy_prescription" placeholder="治法方药" rows="2" style="width:100%; margin-bottom:10px;">{{ info.therapy_prescription }}</textarea>
        <textarea name="follow_up" placeholder="复诊记录" rows="2" style="width:100%; margin-bottom:10px;">{{ info.follow_up }}</textarea>
        <input type="text" name="doctor_name" placeholder="接诊医生" value="{{ info.doctor_name }}" required style="width:100%; margin-bottom:10px;">
        <button type="submit" class="btn">保存修改</button>
        <a href="/" class="btn" style="background:#6c757d; margin-left:10px;">返回列表</a>
    </form>
</body>
</html>

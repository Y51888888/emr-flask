<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统登录</title>
    <style>
        body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f5f5f5;}
        .login-box{width:350px;padding:30px;border:1px solid #ccc;border-radius:8px;background:#fff;}
        input{width:100%;margin:10px 0;padding:10px;box-sizing:border-box;}
        button{width:100%;padding:10px;background:#0066cc;color:white;border:none;border-radius:4px;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="text-align:center;">电子病历系统登录</h2>
        <form method="post">
            <input type="text" name="username" placeholder="账号" required>
            <input type="password" name="pwd" placeholder="密码" required>
            <button type="submit">登录</button>
        </form>
        <p style="text-align:center;color:#666;margin-top:15px;">默认账号：admin  密码：123456</p>
    </div>
</body>
</html>
